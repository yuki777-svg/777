<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Portfolio</title>

  <!-- 字體 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      background:#f5f3ef;
      color:#111;
      font-family:'Montserrat',sans-serif;
      overflow-x:hidden;
    }

    /* ===== Navbar ===== */

    header{
      width:100%;
      position:fixed;
      top:0;
      left:0;
      z-index:1000;

      padding:25px 7%;
      display:flex;
      justify-content:space-between;
      align-items:center;

      background:rgba(245,243,239,0.75);
      backdrop-filter:blur(10px);
    }

    .logo{
      font-family:'Cormorant Garamond',serif;
      font-size:3rem;
      letter-spacing:3px;
      font-weight:600;
    }

    nav{
      display:flex;
      gap:28px;
    }

    nav a{
      text-decoration:none;
      color:#111;
      font-size:.9rem;
      position:relative;
    }

    nav a::after{
      content:'';
      position:absolute;
      left:0;
      bottom:-5px;
      width:0%;
      height:1px;
      background:#111;
      transition:.3s;
    }

    nav a:hover::after{
      width:100%;
    }

    /* ===== Hero ===== */

    .hero{
      min-height:100vh;
      display:grid;
      grid-template-columns:1.1fr 1fr;
      gap:60px;
      align-items:center;

      padding:140px 8% 80px;
      position:relative;
    }

    /* 背景柔光 */
    .hero::before{
      content:'';
      position:absolute;
      width:700px;
      height:700px;
      border-radius:50%;
      background:radial-gradient(rgba(180,160,140,.18), transparent 70%);
      top:-100px;
      right:-200px;
      z-index:-1;
    }

    .left-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      align-items:start;
    }

    .left-grid img{
      width:100%;
      object-fit:cover;
      display:block;
      transition:.5s;
      filter:grayscale(.1);
    }

    .left-grid img:hover{
      transform:scale(1.02);
    }

    .big-img{
      grid-column:1/2;
      grid-row:1/3;
      height:560px;
    }

    .small-img{
      height:270px;
    }

    .hero-content{
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .subtitle{
      font-size:.85rem;
      letter-spacing:4px;
      margin-bottom:20px;
      color:#777;
    }

    h1{
      font-family:'Cormorant Garamond',serif;
      font-size:5rem;
      line-height:.95;
      font-weight:600;
      margin-bottom:25px;
    }

    .description{
      color:#555;
      line-height:1.9;
      max-width:520px;
      margin-bottom:40px;
    }

    .button-group{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
    }

    .btn{
      padding:14px 32px;
      text-decoration:none;
      transition:.35s;
      font-size:.9rem;
      letter-spacing:1px;
      cursor:pointer;
    }

    .btn-dark{
      background:#111;
      color:white;
    }

    .btn-dark:hover{
      background:#7c6856;
    }

    .btn-light{
      border:1px solid #111;
      color:#111;
    }

    .btn-light:hover{
      background:#111;
      color:white;
    }

    /* ===== Works ===== */

    .works{
      padding:120px 8%;
      background:#efebe5;
    }

    .works-top{
      display:flex;
      justify-content:space-between;
      align-items:end;
      margin-bottom:50px;
      flex-wrap:wrap;
      gap:20px;
    }

    .works h2{
      font-family:'Cormorant Garamond',serif;
      font-size:4rem;
      font-weight:600;
    }

    .works p{
      color:#666;
      max-width:500px;
      line-height:1.8;
    }

    .pdf-box{
      width:100%;
      height:800px;
      overflow:hidden;
      background:white;
      box-shadow:0 10px 40px rgba(0,0,0,.08);
    }

    .pdf-box iframe{
      width:100%;
      height:100%;
      border:none;
    }

    /* ===== Footer ===== */

    footer{
      padding:50px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:20px;

      font-size:.9rem;
      color:#666;
    }

    .footer-title{
      font-family:'Cormorant Garamond',serif;
      font-size:2rem;
      color:#111;
    }

    /* ===== Responsive ===== */

    @media(max-width:1000px){

      .hero{
        grid-template-columns:1fr;
      }

      h1{
        font-size:4rem;
      }

      .big-img{
        height:420px;
      }

      .small-img{
        height:200px;
      }
    }

    @media(max-width:700px){

      header{
        padding:20px 5%;
      }

      .logo{
        font-size:2rem;
      }

      nav{
        gap:15px;
      }

      nav a{
        font-size:.75rem;
      }

      .hero{
        padding:120px 5% 60px;
      }

      h1{
        font-size:3rem;
      }

      .works{
        padding:90px 5%;
      }

      .works h2{
        font-size:3rem;
      }

      .pdf-box{
        height:500px;
      }

      footer{
        padding:40px 5%;
      }
    }

  </style>
</head>

<body>

  <!-- ===== Navbar ===== -->

  <header>

    <div class="logo">
      YOUR NAME
    </div>

    <nav>
      <a href="#home">Home</a>
      <a href="#works">Works</a>
      <a href="#contact">Contact</a>
    </nav>

  </header>

  <!-- ===== Hero ===== -->

  <section class="hero" id="home">

    <!-- 左側圖片排版 -->
    <div class="left-grid">

      <!-- 你的照片 -->
      <img src="me.jpg" class="big-img" alt="me">

      <!-- 可重複使用同一張照片 -->
      <img src="me.jpg" class="small-img" alt="me">

      <img src="me.jpg" class="small-img" alt="me">

    </div>

    <!-- 右側文字 -->
    <div class="hero-content">

      <div class="subtitle">
        PERSONAL PORTFOLIO
      </div>

      <h1>
        The Creative <br>
        Version Of Me
      </h1>

      <div class="description">
        這是一個簡約時尚風格的個人網站。
        整體設計參考你提供的精品品牌排版，
        以大標題、留白、雜誌感與高級灰色調為主。
        可用來展示你的個人形象與作品集。
      </div>

      <div class="button-group">

        <a href="work.pdf" target="_blank" class="btn btn-dark">
          OPEN PDF
        </a>

        <a href="#works" class="btn btn-light">
          VIEW WORKS
        </a>

      </div>

    </div>

  </section>

  <!-- ===== Works ===== -->

  <section class="works" id="works">

    <div class="works-top">

      <h2>Selected Works</h2>

      <p>
        下方可以直接預覽你的 PDF 作品集。
        你也能替換成 Behance、Notion 或其他作品網站。
      </p>

    </div>

    <div class="pdf-box">

      <!-- PDF -->
      <iframe src="work.pdf"></iframe>

    </div>

  </section>

  <!-- ===== Footer ===== -->

  <footer id="contact">

    <div class="footer-title">
      YOUR NAME
    </div>

    <div>
      Instagram / Email / Portfolio
    </div>

  </footer>

</body>
</html>
